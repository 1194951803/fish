<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WorkSpace Pro</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%234F7CFF'/%3E%3Ctext x='16' y='22' text-anchor='middle' fill='white' font-size='18' font-family='sans-serif' font-weight='bold'%3EW%3C/text%3E%3C/svg%3E">
<style>
/* ========== Reset & Base ========== */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#F5F6F8;--bg-white:#FFFFFF;--bg-hover:#EBEDF0;
  --text-primary:#1F2329;--text-secondary:#646A73;--text-tertiary:#8F959E;
  --border:#DEE0E3;--border-light:#E8E8E8;
  --accent:#3370FF;--accent-hover:#2860E1;--accent-light:#E8F0FF;
  --green:#34C759;--green-bg:#E8F8EE;--red:#F54A45;--red-bg:#FDECEE;
  --yellow:#FF9F18;--yellow-bg:#FFF3E0;
  --sidebar-bg:#FFFFFF;--nav-bg:#FFFFFF;--status-bg:#FFFFFF;
  --shadow-sm:0 1px 2px rgba(0,0,0,0.06);--shadow-md:0 4px 12px rgba(0,0,0,0.08);
  --shadow-lg:0 8px 24px rgba(0,0,0,0.12);
  --radius:8px;--radius-sm:4px;--radius-lg:12px;
  --font-stack:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
  --font-mono:Consolas,Monaco,"Courier New",monospace;
  --nav-h:48px;--status-h:32px;
}
html,body{height:100%;font-family:var(--font-stack);font-size:14px;color:var(--text-primary);background:var(--bg);overflow:hidden}
body{display:flex;flex-direction:column}

/* ========== Entry/Exit Animations ========== */
#entry-overlay{position:fixed;inset:0;background:#000;z-index:9999;pointer-events:none;animation:entryAnim 800ms ease forwards}
@keyframes entryAnim{
  0%{opacity:1}
  0%{opacity:1}
  60%{opacity:1}
  100%{opacity:0}
}
#exit-overlay{position:fixed;inset:0;z-index:9998;pointer-events:none;opacity:0}
#exit-overlay.active{animation:exitAnim 500ms ease forwards}
@keyframes exitAnim{
  0%{opacity:0;backdrop-filter:blur(0);background:transparent}
  40%{opacity:1;backdrop-filter:blur(8px);background:rgba(0,0,0,0.6)}
  100%{opacity:1;backdrop-filter:blur(0);background:#000}
}
#app-wrapper{animation:contentFadeIn 800ms ease forwards;opacity:0;transform:scale(0.97)}
@keyframes contentFadeIn{
  0%{opacity:0;transform:scale(0.97)}
  37.5%{opacity:0;transform:scale(0.97)}
  100%{opacity:1;transform:scale(1)}
}

/* ========== Top Navbar ========== */
.navbar{height:var(--nav-h);background:var(--nav-bg);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 16px;flex-shrink:0;z-index:100;position:relative}
.navbar-left{display:flex;align-items:center;gap:10px}
.nav-logo{width:28px;height:28px;background:var(--accent);border-radius:6px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:15px;position:relative}
.nav-logo::after{content:'';position:absolute;top:-1px;right:-1px;width:8px;height:8px;background:var(--green);border-radius:50%;border:2px solid var(--nav-bg)}
.nav-title{font-size:15px;font-weight:600;color:var(--text-primary);letter-spacing:-0.3px}
.navbar-center{font-size:13px;color:var(--text-secondary);font-variant-numeric:tabular-nums}
.navbar-right{cursor:pointer;width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:var(--radius);transition:background .2s}
.navbar-right:hover{background:var(--bg-hover)}
.navbar-right svg{width:18px;height:18px;color:var(--text-secondary)}
.navbar-actions{display:flex;align-items:center;gap:4px}
.nav-btn{cursor:pointer;width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:var(--radius);transition:background .2s;border:none;background:none}
.nav-btn:hover{background:var(--bg-hover)}
.nav-btn svg{width:18px;height:18px;color:var(--text-secondary)}
.nav-btn.active svg{color:var(--accent)}

/* ========== Embed Panel (参考文档) ========== */
.embed-panel{width:0;min-width:0;background:var(--sidebar-bg);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;transition:width .3s ease,min-width .3s ease;flex-shrink:0}
.embed-panel.open{width:35%;min-width:280px;max-width:480px}
.embed-panel-header{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;border-bottom:1px solid var(--border-light);flex-shrink:0;background:#FAFBFC}
.embed-panel-title{font-size:12px;font-weight:600;color:var(--text-secondary)}
.embed-panel-close{cursor:pointer;width:24px;height:24px;display:flex;align-items:center;justify-content:center;border-radius:4px;transition:background .15s;border:none;background:none;font-size:14px;color:var(--text-tertiary)}
.embed-panel-close:hover{background:var(--bg-hover);color:var(--text-primary)}
.embed-panel-url{padding:4px 8px;border-bottom:1px solid var(--border-light);flex-shrink:0}
.embed-url-input{width:100%;border:1px solid var(--border);border-radius:var(--radius-sm);padding:4px 8px;font-size:11px;outline:none;font-family:var(--font-mono);color:var(--text-secondary);background:var(--bg)}
.embed-url-input:focus{border-color:var(--accent);color:var(--text-primary)}
.embed-panel-body{flex:1;overflow:hidden;position:relative}
.embed-panel-body iframe{width:100%;height:100%;border:none}
.embed-placeholder{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--text-tertiary);font-size:13px;gap:8px}
.embed-placeholder-icon{font-size:32px;opacity:.4}
.embed-error{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--text-tertiary);font-size:12px;gap:6px;padding:20px;text-align:center}
.embed-error-icon{font-size:28px;color:var(--yellow)}

/* ========== URL Input Modal ========== */
.url-modal-box{background:var(--bg-white);border-radius:var(--radius-lg);box-shadow:var(--shadow-lg);padding:24px;max-width:480px;width:90%;transform:scale(0.95);transition:transform .25s}
.modal-overlay.show .url-modal-box{transform:scale(1)}
.url-modal-title{font-size:16px;font-weight:600;margin-bottom:4px}
.url-modal-desc{font-size:12px;color:var(--text-secondary);margin-bottom:16px}
.url-input-group{display:flex;gap:8px;margin-bottom:12px}
.url-input-field{flex:1;border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 12px;font-size:13px;outline:none;font-family:var(--font-mono);transition:border-color .2s}
.url-input-field:focus{border-color:var(--accent)}
.url-input-field::placeholder{color:var(--text-tertiary);font-family:var(--font-stack)}
.url-confirm-btn{background:var(--accent);color:#fff;border:none;border-radius:var(--radius-sm);padding:8px 16px;font-size:13px;cursor:pointer;font-family:var(--font-stack);transition:background .2s;white-space:nowrap}
.url-confirm-btn:hover{background:var(--accent-hover)}
.url-hint{font-size:11px;color:var(--text-tertiary);line-height:1.5}
.url-history{margin-top:12px}
.url-history-title{font-size:11px;color:var(--text-tertiary);margin-bottom:6px}
.url-history-list{display:flex;flex-direction:column;gap:4px}
.url-history-item{display:flex;align-items:center;justify-content:space-between;padding:4px 8px;border-radius:var(--radius-sm);cursor:pointer;transition:background .15s;font-size:11px;font-family:var(--font-mono);color:var(--text-secondary)}
.url-history-item:hover{background:var(--bg)}
.url-history-item .url-del{color:var(--text-tertiary);cursor:pointer;font-size:12px;padding:0 4px}
.url-history-item .url-del:hover{color:var(--red)}

/* ========== Main Content Area ========== */
.main-area{flex:1;display:flex;overflow:hidden;position:relative}
.content-panel{flex:1;overflow-y:auto;padding:16px;min-width:0}
.todo-panel{width:35%;min-width:300px;max-width:420px;background:var(--sidebar-bg);border-left:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}

/* ========== Status Bar ========== */
.statusbar{height:var(--status-h);background:var(--status-bg);border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 16px;font-size:12px;color:var(--text-tertiary);flex-shrink:0}
.statusbar-left{display:flex;align-items:center;gap:8px}
.status-dot{width:7px;height:7px;background:var(--green);border-radius:50%;display:inline-block;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}

/* ========== Role Selector Modal ========== */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:500;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s}
.modal-overlay.show{opacity:1;pointer-events:auto}
.modal-box{background:var(--bg-white);border-radius:var(--radius-lg);box-shadow:var(--shadow-lg);padding:32px;max-width:680px;width:90%;transform:scale(0.95);transition:transform .25s}
.modal-overlay.show .modal-box{transform:scale(1)}
.modal-title{font-size:20px;font-weight:600;text-align:center;margin-bottom:8px}
.modal-subtitle{font-size:13px;color:var(--text-secondary);text-align:center;margin-bottom:24px}
.role-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.role-card{border:2px solid var(--border-light);border-radius:var(--radius);padding:20px 12px;text-align:center;cursor:pointer;transition:all .2s}
.role-card:hover{border-color:var(--accent);background:var(--accent-light);transform:translateY(-2px)}
.role-card.selected{border-color:var(--accent);background:var(--accent-light)}
.role-icon{font-size:32px;margin-bottom:8px;display:block}
.role-name{font-size:14px;font-weight:600;margin-bottom:4px}
.role-desc{font-size:11px;color:var(--text-secondary);line-height:1.4}

/* ========== Todo Panel ========== */
.todo-header{padding:16px;border-bottom:1px solid var(--border-light)}
.todo-header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.todo-title{font-size:15px;font-weight:600}
.todo-count{font-size:12px;color:var(--text-secondary);background:var(--bg);padding:2px 8px;border-radius:10px}
.todo-progress{height:4px;background:var(--bg);border-radius:2px;overflow:hidden}
.todo-progress-bar{height:100%;background:var(--accent);border-radius:2px;transition:width .3s}
.todo-list{flex:1;overflow-y:auto;padding:8px 16px}
.todo-item{display:flex;align-items:center;gap:8px;padding:8px;border-radius:var(--radius-sm);cursor:grab;transition:background .15s;margin-bottom:2px}
.todo-item:hover{background:var(--bg)}
.todo-item.dragging{opacity:.5;background:var(--accent-light)}
.todo-item.drag-over{border-top:2px solid var(--accent)}
.todo-checkbox{width:16px;height:16px;border:2px solid var(--border);border-radius:4px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .2s}
.todo-checkbox.checked{background:var(--accent);border-color:var(--accent)}
.todo-checkbox.checked::after{content:'✓';color:#fff;font-size:11px;font-weight:700}
.todo-text{flex:1;font-size:13px;line-height:1.4;word-break:break-word}
.todo-text.done{text-decoration:line-through;color:var(--text-tertiary)}
.todo-delete{width:20px;height:20px;display:flex;align-items:center;justify-content:center;border-radius:4px;cursor:pointer;color:var(--text-tertiary);font-size:14px;opacity:0;transition:all .15s;flex-shrink:0}
.todo-item:hover .todo-delete{opacity:1}
.todo-delete:hover{background:var(--red-bg);color:var(--red)}
.todo-input-area{padding:12px 16px;border-top:1px solid var(--border-light);display:flex;gap:8px}
.todo-input{flex:1;border:1px solid var(--border);border-radius:var(--radius-sm);padding:6px 10px;font-size:13px;outline:none;font-family:var(--font-stack);transition:border-color .2s}
.todo-input:focus{border-color:var(--accent)}
.todo-add-btn{background:var(--accent);color:#fff;border:none;border-radius:var(--radius-sm);padding:6px 14px;font-size:13px;cursor:pointer;font-family:var(--font-stack);transition:background .2s}
.todo-add-btn:hover{background:var(--accent-hover)}

/* ========== Developer Mode ========== */
.dev-container{display:flex;flex-direction:column;gap:12px}
.diff-viewer{height:420px;background:var(--bg-white);border-radius:var(--radius);border:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0}
.diff-header{display:flex;align-items:center;gap:12px;padding:8px 14px;border-bottom:1px solid var(--border-light);background:#FAFBFC;flex-shrink:0}
.diff-filename{font-family:var(--font-mono);font-size:13px;font-weight:500}
.diff-stats{font-size:12px;color:var(--green);font-weight:500}
.diff-stats .del{color:var(--red)}
.diff-tag{font-size:11px;background:var(--accent-light);color:var(--accent);padding:2px 8px;border-radius:10px}
.diff-body{flex:1;overflow-y:auto;font-family:var(--font-mono);font-size:12.5px;line-height:1.7}
.diff-line{display:flex;padding:0 14px;white-space:pre}
.diff-line-num{width:40px;text-align:right;color:var(--text-tertiary);user-select:none;flex-shrink:0;margin-right:14px}
.diff-line.add{background:#E6FFED}
.diff-line.del{background:#FFEBE9}
.diff-line.add .diff-line-num{color:#22863A}
.diff-line.del .diff-line-num{color:#CB2431}
.diff-line-content{flex:1}
/* Syntax highlighting */
.syn-kw{color:#CF222E}.syn-str{color:#0A3069}.syn-cmt{color:#6E7781;font-style:italic}.syn-fn{color:#8250DF}.syn-num{color:#0550AE}.syn-op{color:#CF222E}.syn-dec{color:#953800}

.terminal-panel{height:220px;background:#1E1E1E;border-radius:var(--radius);border:1px solid #333;display:flex;flex-direction:column;overflow:hidden;flex-shrink:0}
.terminal-header{display:flex;align-items:center;gap:8px;padding:6px 12px;background:#2D2D2D;flex-shrink:0}
.terminal-dot{width:10px;height:10px;border-radius:50%}
.terminal-dot.r{background:#FF5F56}.terminal-dot.y{background:#FFBD2E}.terminal-dot.g{background:#27C93F}
.terminal-tab{font-size:11px;color:#999;margin-left:8px;font-family:var(--font-mono)}
.terminal-body{flex:1;overflow-y:auto;padding:8px 12px;font-family:var(--font-mono);font-size:12px;color:#D4D4D4;line-height:1.6}
.terminal-body .t-green{color:#4EC9B0}.terminal-body .t-yellow{color:#DCDCAA}.terminal-body .t-blue{color:#569CD6}.terminal-body .t-red{color:#F44747}.terminal-body .t-gray{color:#808080}.terminal-body .t-white{color:#D4D4D4}
.terminal-cursor{display:inline-block;width:7px;height:14px;background:#D4D4D4;animation:blink 1s step-end infinite;vertical-align:text-bottom}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

/* ========== Designer Mode ========== */
.designer-container{display:flex;flex-direction:column;height:100%;gap:12px}
.designer-toolbar{display:flex;align-items:center;gap:4px;padding:6px 10px;background:var(--bg-white);border:1px solid var(--border);border-radius:var(--radius);flex-shrink:0}
.tool-btn{width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:var(--radius-sm);cursor:pointer;font-size:16px;transition:background .15s;color:var(--text-secondary)}
.tool-btn:hover{background:var(--bg-hover)}
.tool-btn.active{background:var(--accent-light);color:var(--accent)}
.tool-sep{width:1px;height:20px;background:var(--border);margin:0 4px}
.designer-main{flex:1;display:flex;gap:12px;min-height:0;overflow:hidden}
.designer-canvas{flex:1;background:var(--bg-white);border:1px solid var(--border);border-radius:var(--radius);display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative}
.phone-frame{width:260px;height:500px;border:3px solid #1F2329;border-radius:28px;background:#fff;position:relative;overflow:hidden;box-shadow:var(--shadow-md)}
.phone-notch{width:100px;height:20px;background:#1F2329;border-radius:0 0 12px 12px;margin:0 auto;position:relative;z-index:2}
.phone-header{height:40px;background:var(--accent);display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;font-weight:500}
.phone-banner{height:100px;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);margin:8px;border-radius:8px}
.phone-content{padding:8px 12px}
.phone-content h3{font-size:14px;font-weight:600;margin-bottom:4px}
.phone-content p{font-size:10px;color:var(--text-secondary);line-height:1.4;margin-bottom:8px}
.phone-cta{display:block;background:var(--accent);color:#fff;text-align:center;padding:6px;border-radius:6px;font-size:11px;font-weight:500;margin-bottom:8px}
.phone-tabbar{position:absolute;bottom:0;left:0;right:0;height:44px;background:#FAFAFA;border-top:1px solid var(--border-light);display:flex;align-items:center;justify-content:space-around}
.phone-tab{font-size:9px;color:var(--text-tertiary);text-align:center}
.phone-tab.active{color:var(--accent)}
.phone-tab-icon{font-size:14px;display:block;margin-bottom:1px}
/* Selection overlay */
.selection-box{position:absolute;border:2px solid #3370FF;pointer-events:none;z-index:10;transition:all .4s ease}
.selection-box::before,.selection-box::after{content:'';position:absolute;width:6px;height:6px;background:#3370FF;border:1px solid #fff;border-radius:1px}
.selection-box::before{top:-4px;left:-4px}
.selection-box::after{bottom:-4px;right:-4px}
.sel-label{position:absolute;top:-18px;left:0;background:#3370FF;color:#fff;font-size:10px;padding:1px 6px;border-radius:3px;white-space:nowrap}

.designer-right{width:220px;display:flex;flex-direction:column;gap:12px;flex-shrink:0;overflow-y:auto}
.panel-section{background:var(--bg-white);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.panel-section-title{font-size:12px;font-weight:600;padding:8px 10px;border-bottom:1px solid var(--border-light);color:var(--text-secondary)}
.layer-tree{padding:4px 0}
.layer-item{display:flex;align-items:center;gap:6px;padding:4px 10px;font-size:12px;cursor:pointer;transition:background .15s}
.layer-item:hover{background:var(--bg-hover)}
.layer-item.active{background:var(--accent-light);color:var(--accent)}
.layer-icon{font-size:11px;color:var(--text-tertiary);width:16px;text-align:center}
.layer-toggle{margin-left:auto;font-size:10px;color:var(--text-tertiary);cursor:pointer}
.props-grid{padding:8px 10px;display:grid;grid-template-columns:1fr 1fr;gap:6px}
.prop-item{font-size:11px}
.prop-label{color:var(--text-tertiary);margin-bottom:2px}
.prop-value{color:var(--text-primary);font-weight:500}
.designer-info{font-size:11px;color:var(--text-tertiary);padding:6px 10px;background:var(--bg-white);border:1px solid var(--border);border-radius:var(--radius);flex-shrink:0;display:flex;justify-content:space-between}

/* ========== PM Mode ========== */
.pm-container{max-width:760px;margin:0 auto;padding-bottom:24px}
.pm-doc{background:var(--bg-white);border:1px solid var(--border);border-radius:var(--radius);padding:32px 40px;box-shadow:var(--shadow-sm)}
.pm-doc-title{font-size:22px;font-weight:700;margin-bottom:12px;line-height:1.3}
.pm-meta{display:flex;align-items:center;gap:10px;margin-bottom:24px;flex-wrap:wrap}
.pm-tag{font-size:11px;padding:3px 10px;border-radius:10px;font-weight:500}
.pm-tag.review{background:var(--yellow-bg);color:var(--yellow)}
.pm-meta-text{font-size:12px;color:var(--text-secondary)}
.pm-section{margin-bottom:24px}
.pm-section h2{font-size:16px;font-weight:600;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border-light)}
.pm-section p{font-size:13px;line-height:1.7;color:var(--text-secondary);margin-bottom:8px}
.pm-checklist{list-style:none}
.pm-check-item{display:flex;align-items:flex-start;gap:8px;padding:6px 0;font-size:13px}
.pm-check{width:16px;height:16px;border:2px solid var(--border);border-radius:4px;flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;cursor:default}
.pm-check.done{background:var(--green);border-color:var(--green)}
.pm-check.done::after{content:'✓';color:#fff;font-size:10px;font-weight:700}
.pm-check-text.done{text-decoration:line-through;color:var(--text-tertiary)}
.pm-chart{width:100%;height:180px;border:1px solid var(--border-light);border-radius:var(--radius);overflow:hidden;padding:12px}
.pm-chart svg{width:100%;height:100%}
.pm-timeline{position:relative;padding-left:24px}
.pm-timeline::before{content:'';position:absolute;left:8px;top:4px;bottom:4px;width:2px;background:var(--border)}
.pm-tl-item{position:relative;margin-bottom:16px}
.pm-tl-item::before{content:'';position:absolute;left:-20px;top:4px;width:10px;height:10px;border-radius:50%;background:var(--accent);border:2px solid var(--accent-light)}
.pm-tl-item.done::before{background:var(--green);border-color:var(--green-bg)}
.pm-tl-date{font-size:11px;color:var(--text-tertiary);margin-bottom:2px}
.pm-tl-title{font-size:13px;font-weight:500}
.pm-tl-desc{font-size:12px;color:var(--text-secondary)}
.pm-footer{display:flex;gap:16px;margin-top:20px;padding-top:16px;border-top:1px solid var(--border-light)}
.pm-footer-item{font-size:12px;color:var(--text-secondary);cursor:pointer;display:flex;align-items:center;gap:4px}
.pm-footer-item:hover{color:var(--accent)}
.pm-footer-badge{background:var(--bg);padding:1px 6px;border-radius:8px;font-size:11px}

/* ========== Operator Mode ========== */
.op-container{display:flex;flex-direction:column;gap:12px;height:100%}
.op-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;flex-shrink:0}
.op-card{background:var(--bg-white);border:1px solid var(--border);border-radius:var(--radius);padding:16px;transition:box-shadow .2s}
.op-card:hover{box-shadow:var(--shadow-md)}
.op-card-label{font-size:12px;color:var(--text-secondary);margin-bottom:6px}
.op-card-value{font-size:24px;font-weight:700;margin-bottom:4px;font-variant-numeric:tabular-nums}
.op-card-change{font-size:12px;font-weight:500}
.op-card-change.up{color:var(--green)}.op-card-change.down{color:var(--red)}
.op-chart{background:var(--bg-white);border:1px solid var(--border);border-radius:var(--radius);padding:16px;flex-shrink:0}
.op-chart-title{font-size:13px;font-weight:600;margin-bottom:12px}
.op-bar-chart{display:flex;align-items:flex-end;gap:12px;height:140px;padding-bottom:20px;position:relative}
.op-bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;height:100%;justify-content:flex-end}
.op-bar{width:100%;background:var(--accent);border-radius:4px 4px 0 0;transition:height .6s ease;min-height:4px;position:relative}
.op-bar-val{font-size:10px;color:var(--text-secondary);font-variant-numeric:tabular-nums}
.op-bar-label{font-size:10px;color:var(--text-tertiary);position:absolute;bottom:-18px}
.op-content-list{background:var(--bg-white);border:1px solid var(--border);border-radius:var(--radius);flex:1;overflow:hidden;display:flex;flex-direction:column;min-height:0}
.op-content-header{padding:12px 16px;border-bottom:1px solid var(--border-light);font-size:13px;font-weight:600;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.op-content-count{font-size:11px;color:var(--text-tertiary);font-weight:400}
.op-content-items{flex:1;overflow-y:auto;padding:4px 0}
.op-content-item{display:flex;align-items:center;gap:10px;padding:8px 16px;transition:background .15s}
.op-content-item:hover{background:var(--bg)}
.op-content-icon{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.op-content-icon.article{background:#E8F0FF;color:var(--accent)}
.op-content-icon.video{background:#F3E8FF;color:#8250DF}
.op-content-icon.activity{background:#E8F8EE;color:var(--green)}
.op-content-info{flex:1;min-width:0}
.op-content-title{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.op-content-meta{font-size:11px;color:var(--text-tertiary);margin-top:1px}
.op-content-status{font-size:11px;padding:2px 8px;border-radius:10px;flex-shrink:0}
.op-content-status.scheduled{background:var(--accent-light);color:var(--accent)}
.op-content-status.reviewing{background:var(--yellow-bg);color:var(--yellow)}

/* ========== Scrollbar ========== */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#C4C4C4;border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:#999}

/* ========== Responsive ========== */
@media(max-width:900px){
  .todo-panel{width:280px;min-width:240px}
  .role-grid{grid-template-columns:repeat(2,1fr)}
  .op-cards{grid-template-columns:1fr}
  .designer-right{width:180px}
}
@media(max-width:640px){
  .todo-panel{display:none}
  .role-grid{grid-template-columns:1fr 1fr}
  .designer-right{display:none}
}

<script>
/* ========== Global State ========== */
let currentRole = null;
let exitPollingId = null;

/* ========== Utility ========== */
function $(sel){return document.querySelector(sel)}
function $$(sel){return document.querySelectorAll(sel)}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}

/* ========== Clock ========== */
function updateClock(){
  const now=new Date();
  const days=['周日','周一','周二','周三','周四','周五','周六'];
  const y=now.getFullYear(),m=String(now.getMonth()+1).padStart(2,'0'),d=String(now.getDate()).padStart(2,'0');
  const h=String(now.getHours()).padStart(2,'0'),mi=String(now.getMinutes()).padStart(2,'0'),s=String(now.getSeconds()).padStart(2,'0');
  $('#clock').textContent=`${days[now.getDay()]} ${y}-${m}-${d} ${h}:${mi}:${s}`;
}
setInterval(updateClock,1000);
updateClock();

/* ========== Role Management ========== */
function getRoleFromURL(){
  const p=new URLSearchParams(location.search);
  return p.get('role')||null;
}
function getRoleFromStorage(){
  return localStorage.getItem('wsp_role')||null;
}
function saveRole(role){
  localStorage.setItem('wsp_role',role);
  currentRole=role;
}
function showRoleModal(force){
  const modal=$('#role-modal');
  modal.classList.add('show');
  $$('.role-card').forEach(c=>{
    c.classList.toggle('selected',c.dataset.role===currentRole);
  });
}
function hideRoleModal(){$('#role-modal').classList.remove('show')}
function selectRole(role){
  saveRole(role);
  hideRoleModal();
  renderContent();
  updateRoleCardSelection();
}
function updateRoleCardSelection(){
  $$('.role-card').forEach(c=>c.classList.toggle('selected',c.dataset.role===currentRole));
}

/* ========== Embed Panel (参考文档) ========== */
const EMBED_STORAGE_KEY='wsp_embed_url';
const EMBED_HISTORY_KEY='wsp_embed_history';

function getEmbedUrl(){
  try{return localStorage.getItem(EMBED_STORAGE_KEY)||''}catch(e){return ''}
}
function saveEmbedUrl(url){
  try{localStorage.setItem(EMBED_STORAGE_KEY,url)}catch(e){}
}
function getEmbedHistory(){
  try{const d=localStorage.getItem(EMBED_HISTORY_KEY);return d?JSON.parse(d):[]}catch(e){return []}
}
function saveEmbedHistory(history){
  try{localStorage.setItem(EMBED_HISTORY_KEY,JSON.stringify(history.slice(0,8)))}catch(e){}
}
function addToHistory(url){
  if(!url)return;
  let h=getEmbedHistory().filter(u=>u!==url);
  h.unshift(url);
  saveEmbedHistory(h);
}
function removeFromHistory(url){
  saveEmbedHistory(getEmbedHistory().filter(u=>u!==url));
}

function showUrlModal(){
  const modal=$('#url-modal');
  const input=$('#url-input-field');
  modal.classList.add('show');
  input.value=getEmbedUrl();
  renderUrlHistory();
  setTimeout(()=>input.focus(),100);
}
function hideUrlModal(){$('#url-modal').classList.remove('show')}

function renderUrlHistory(){
  const h=getEmbedHistory();
  const container=$('#url-history');
  const list=$('#url-history-list');
  if(!h.length){container.style.display='none';return}
  container.style.display='block';
  list.innerHTML=h.map(u=>`<div class="url-history-item" data-url="${u}"><span>${u.length>40?u.slice(0,40)+'…':u}</span><span class="url-del" data-url="${u}">✕</span></div>`).join('');
  list.querySelectorAll('.url-history-item').forEach(item=>{
    item.addEventListener('click',e=>{
      if(e.target.classList.contains('url-del')){
        e.stopPropagation();
        removeFromHistory(e.target.dataset.url);
        renderUrlHistory();
        return;
      }
      loadEmbedUrl(item.dataset.url);
      hideUrlModal();
    });
  });
}

function confirmUrl(){
  let url=$('#url-input-field').value.trim();
  if(!url)return;
  if(!url.startsWith('http://')&&!url.startsWith('https://'))url='https://'+url;
  loadEmbedUrl(url);
  hideUrlModal();
}

function loadEmbedUrl(url){
  saveEmbedUrl(url);
  addToHistory(url);
  const panel=$('#embed-panel');
  const body=$('#embed-body');
  const input=$('#embed-url-input');
  const placeholder=$('#embed-placeholder');
  // Open panel
  panel.classList.add('open');
  $('#embed-btn').classList.add('active');
  input.value=url;
  // Remove placeholder & old iframe
  if(placeholder)placeholder.style.display='none';
  const oldIframe=body.querySelector('iframe');
  if(oldIframe)oldIframe.remove();
  const oldError=body.querySelector('.embed-error');
  if(oldError)oldError.remove();
  // Create iframe
  const iframe=document.createElement('iframe');
  iframe.setAttribute('sandbox','allow-scripts allow-same-origin allow-forms allow-popups');
  iframe.setAttribute('referrerpolicy','no-referrer');
  iframe.style.cssText='width:100%;height:100%;border:none';
  // Handle load errors (sites that block iframe)
  iframe.addEventListener('load',()=>{
    try{
      // If we can access contentDocument, it loaded successfully
      const doc=iframe.contentDocument||iframe.contentWindow.document;
      if(doc&&doc.title)iframe.title=doc.title;
    }catch(e){
      // Cross-origin: likely loaded fine but we can't access it
    }
  });
  iframe.addEventListener('error',()=>{
    iframe.remove();
    const errDiv=document.createElement('div');
    errDiv.className='embed-error';
    errDiv.innerHTML='<span class="embed-error-icon">⚠️</span><span>无法加载此页面</span><span style="font-size:11px">该网站可能禁止了嵌入显示，请尝试其他网站</span>';
    body.appendChild(errDiv);
  });
  body.appendChild(iframe);
  iframe.src=url;
}

function closeEmbedPanel(){
  const panel=$('#embed-panel');
  panel.classList.remove('open');
  $('#embed-btn').classList.remove('active');
}

function initEmbed(){
  // Navbar button
  $('#embed-btn').addEventListener('click',()=>{
    const panel=$('#embed-panel');
    if(panel.classList.contains('open')){
      // If already open and has URL, close it; otherwise show URL modal
      if(getEmbedUrl()){
        closeEmbedPanel();
      }else{
        showUrlModal();
      }
    }else{
      const savedUrl=getEmbedUrl();
      if(savedUrl){
        loadEmbedUrl(savedUrl);
      }else{
        showUrlModal();
      }
    }
  });
  // Close button
  $('#embed-close-btn').addEventListener('click',closeEmbedPanel);
  // URL modal
  $('#url-confirm-btn').addEventListener('click',confirmUrl);
  $('#url-input-field').addEventListener('keydown',e=>{if(e.key==='Enter')confirmUrl()});
  $('#url-modal').addEventListener('click',e=>{if(e.target===$('#url-modal'))hideUrlModal()});
  // Panel URL input (direct edit)
  const panelInput=$('#embed-url-input');
  let panelInputTimer=null;
  panelInput.addEventListener('keydown',e=>{
    if(e.key==='Enter'){
      let url=panelInput.value.trim();
      if(!url)return;
      if(!url.startsWith('http://')&&!url.startsWith('https://'))url='https://'+url;
      loadEmbedUrl(url);
    }
  });
  // Restore saved state
  if(getEmbedUrl()){
    // Don't auto-open, but mark button as available
  }
}

/* ========== Init ========== */
function init(){
  const urlRole=getRoleFromURL();
  const storedRole=getRoleFromStorage();
  const role=urlRole||storedRole;
  if(role&&['developer','designer','pm','operator'].includes(role)){
    saveRole(role);
    renderContent();
  } else {
    showRoleModal(true);
  }
  // Event listeners
  $$('.role-card').forEach(c=>{
    c.addEventListener('click',()=>selectRole(c.dataset.role));
  });
  $('#settings-btn').addEventListener('click',()=>showRoleModal(true));
  $('#role-modal').addEventListener('click',e=>{
    if(e.target===$('#role-modal'))hideRoleModal();
  });
  // Todo init
  initTodo();
  // Embed panel init
  initEmbed();
  // Exit polling
  startExitPolling();
}

/* ========== Render Content ========== */
function renderContent(){
  const panel=$('#content-panel');
  panel.innerHTML='';
  switch(currentRole){
    case 'developer': renderDeveloper(panel); break;
    case 'designer': renderDesigner(panel); break;
    case 'pm': renderPM(panel); break;
    case 'operator': renderOperator(panel); break;
  }
}

function renderDeveloper(panel){
  const tpl=diffTemplates[Math.floor(Math.random()*diffTemplates.length)];
  let diffHTML='';
  tpl.lines.forEach(l=>{
    const cls=l.t==='add'?'add':l.t==='del'?'del':'';
    const prefix=l.t==='add'?'+':l.t==='del'?'-':' ';
    diffHTML+=`<div class="diff-line ${cls}"><span class="diff-line-num">${l.n}</span><span class="diff-line-content">${prefix}${l.c}</span></div>`;
  });

  panel.innerHTML=`
    <div class="dev-container">
      <div class="diff-viewer">
        <div class="diff-header">
          <span class="diff-filename">${tpl.filename}</span>
          <span class="diff-stats"><span class="add">+${tpl.stats.split(' ')[0].slice(1)}</span> <span class="del">${tpl.stats.split(' ')[1]}</span></span>
          <span class="diff-tag">代码审查</span>
        </div>
        <div class="diff-body">${diffHTML}</div>
      </div>
      <div class="terminal-panel">
        <div class="terminal-header">
          <span class="terminal-dot r"></span><span class="terminal-dot y"></span><span class="terminal-dot g"></span>
          <span class="terminal-tab">zsh — 80×24</span>
        </div>
        <div class="terminal-body" id="terminal-body"></div>
      </div>
    </div>`;

  // Terminal animation
  const body=$('#terminal-body');
  let lineIdx=0;
  function addTermLine(){
    if(lineIdx>=terminalOutputs.length)return;
    const line=terminalOutputs[lineIdx];
    const div=document.createElement('div');
    div.innerHTML=line.text||'&nbsp;';
    body.appendChild(div);
    body.scrollTop=body.scrollHeight;
    lineIdx++;
    const delay=lineIdx<3?800:lineIdx<10?200:Math.floor(Math.random()*3000)+5000;
    setTimeout(addTermLine,delay);
  }
  // Add cursor
  const cursorSpan=document.createElement('span');
  cursorSpan.className='terminal-cursor';
  body.appendChild(cursorSpan);
  setTimeout(addTermLine,1500);
}

const opInitialData={
  pv:128456, pvChange:12.3,
  cvr:3.82, cvrChange:0.5,
  users:2341, usersChange:8.7,
};
const barData=[
  {day:'周一',val:18234},{day:'周二',val:21567},{day:'周三',val:19876},
  {day:'周四',val:24321},{day:'周五',val:22109},{day:'周六',val:16782},{day:'周日',val:14567},
];
const contentItems=[
  {type:'article',icon:'📄',title:'春季营销活动复盘报告',meta:'王五 · 10分钟前',status:'reviewing',statusText:'审核中'},
  {type:'video',icon:'🎬',title:'产品使用教程系列 - 第三期',meta:'李四 · 30分钟前',status:'scheduled',statusText:'定时发布 15:00'},

  {type:'video',icon:'🎬',title:'品牌宣传片最终版',meta:'陈七 · 3小时前',status:'reviewing',statusText:'审核中'},
];
const extraContent=[
  {type:'article',icon:'📄',title:'竞品分析报告 - Q2 季度',meta:'系统 · 刚刚',status:'reviewing',statusText:'待审核'},
  {type:'activity',icon:'🎉',title:'会员日专属优惠方案',meta:'系统 · 刚刚',status:'scheduled',statusText:'定时发布 20:00'},
  {type:'article',icon:'📄',title:'社交媒体运营周报',meta:'系统 · 刚刚',status:'reviewing',statusText:'待审核'},
  {type:'video',icon:'🎬',title:'用户故事系列 - 第五期',meta:'系统 · 刚刚',status:'scheduled',statusText:'定时发布 明天 09:00'},
  {type:'activity',icon:'🎉',title:'618 预热活动策划方案',meta:'系统 · 刚刚',status:'reviewing',statusText:'待审核'},
];
let extraIdx=0;

function renderOperator(panel){
  const maxBar=Math.max(...barData.map(b=>b.val));

  let barsHTML='';
  barData.forEach(b=>{
    const h=Math.round((b.val/maxBar)*110);
    barsHTML+=`<div class="op-bar-col"><div class="op-bar-val">${(b.val/1000).toFixed(1)}k</div><div class="op-bar" style="height:${h}px" data-orig="${h}"></div><span class="op-bar-label">${b.day}</span></div>`;
  });

  let itemsHTML='';
  contentItems.forEach(c=>{
    itemsHTML+=`<div class="op-content-item"><div class="op-content-icon ${c.type}">${c.icon}</div><div class="op-content-info"><div class="op-content-title">${c.title}</div><div class="op-content-meta">${c.meta}</div></div><span class="op-content-status ${c.status}">${c.statusText}</span></div>`;
  });

  panel.innerHTML=`
    <div class="op-container">
      <div class="op-cards">
        <div class="op-card">
          <div class="op-card-label">页面浏览量 (PV)</div>
          <div class="op-card-value" id="op-pv">${opInitialData.pv.toLocaleString()}</div>
          <div class="op-card-change up" id="op-pv-change">↑ ${opInitialData.pvChange}%</div>
        </div>
        <div class="op-card">
          <div class="op-card-label">转化率</div>
          <div class="op-card-value" id="op-cvr">${opInitialData.cvr}%</div>
          <div class="op-card-change up" id="op-cvr-change">↑ ${opInitialData.cvrChange}%</div>
        </div>
        <div class="op-card">
          <div class="op-card-label">新增用户</div>
          <div class="op-card-value" id="op-users">${opInitialData.users.toLocaleString()}</div>
          <div class="op-card-change up" id="op-users-change">↑ ${opInitialData.usersChange}%</div>
        </div>
      </div>
      <div class="op-chart">
        <div class="op-chart-title">近 7 天 PV 趋势</div>
        <div class="op-bar-chart" id="op-bar-chart">${barsHTML}</div>
      </div>
      <div class="op-content-list">
        <div class="op-content-header">
          <span>待发布内容</span>
          <span class="op-content-count" id="op-content-count">${contentItems.length} 条</span>
        </div>
        <div class="op-content-items" id="op-content-items">${itemsHTML}</div>
      </div>
    </div>`;

  // Data fluctuation every 15s
  setInterval(()=>{
    const pvEl=$('#op-pv');
    const cvrEl=$('#op-cvr');
    const usersEl=$('#op-users');
    if(!pvEl)return;
    const pvDelta=Math.floor(Math.random()*200)-80;
    const pv=parseInt(pvEl.textContent.replace(/,/g,''))+pvDelta;
    pvEl.textContent=pv.toLocaleString();
    const pvChangeEl=$('#op-pv-change');
    const pvPct=(pvDelta/opInitialData.pv*100);
    pvChangeEl.textContent=(pvDelta>=0?'↑ ':'↓ ')+Math.abs(pvPct).toFixed(1)+'%';
    pvChangeEl.className='op-card-change '+(pvDelta>=0?'up':'down');

    const cvrDelta=(Math.random()*0.1-0.04);
    const cvr=parseFloat(cvrEl.textContent)+cvrDelta;
    cvrEl.textContent=cvr.toFixed(2)+'%';
    const cvrChangeEl=$('#op-cvr-change');
    cvrChangeEl.textContent=(cvrDelta>=0?'↑ ':'↓ ')+Math.abs(cvrDelta).toFixed(2)+'%';
    cvrChangeEl.className='op-card-change '+(cvrDelta>=0?'up':'down');

    const usersDelta=Math.floor(Math.random()*30)-10;
    const users=parseInt(usersEl.textContent.replace(/,/g,''))+usersDelta;
    usersEl.textContent=users.toLocaleString();
    const usersChangeEl=$('#op-users-change');
    const usersPct=(usersDelta/opInitialData.users*100);
    usersChangeEl.textContent=(usersDelta>=0?'↑ ':'↓ ')+Math.abs(usersPct).toFixed(1)+'%';
    usersChangeEl.className='op-card-change '+(usersDelta>=0?'up':'down');
  },15000);

  // Bar chart fluctuation every 20s
  setInterval(()=>{
    const bars=$$('#op-bar-chart .op-bar');
    const vals=$$('#op-bar-chart .op-bar-val');
    if(!bars.length)return;
    bars.forEach((bar,i)=>{
      const orig=parseInt(bar.dataset.orig);
      const delta=Math.floor(Math.random()*10)-4;
      const newH=Math.max(10,orig+delta);
      bar.style.height=newH+'px';
      const newBarVal=barData[i].val+delta*200;
      vals[i].textContent=(newBarVal/1000).toFixed(1)+'k';
    });
  },20000);

  // Auto add content every 20s
  setInterval(()=>{
    const list=$('#op-content-items');
    const countEl=$('#op-content-count');
    if(!list||extraIdx>=extraContent.length)return;
    const c=extraContent[extraIdx++];
    const div=document.createElement('div');
    div.className='op-content-item';
    div.style.animation='contentFadeIn .4s ease';
    div.innerHTML=`<div class="op-content-icon ${c.type}">${c.icon}</div><div class="op-content-info"><div class="op-content-title">${c.title}</div><div class="op-content-meta">${c.meta}</div></div><span class="op-content-status ${c.status}">${c.statusText}</span>`;
    list.prepend(div);
    const total=contentItems.length+extraIdx;
    countEl.textContent=total+' 条';
  },20000);
}

   ================================================================ */
const defaultTodos=[
  {id:1,text:'Review PR #234 - JWT token refresh logic',done:true},
  {id:2,text:'Update API documentation for v2.1',done:true},
  {id:3,text:'Fix responsive layout issue on dashboard',done:true},
  {id:4,text:'Write unit tests for payment module',done:false},
  {id:5,text:'Prepare sprint retrospective slides',done:false},
  {id:6,text:'Investigate memory leak in WebSocket handler',done:false},
  {id:7,text:'Deploy staging environment for QA',done:false},
];

function loadTodos(){
  const raw=localStorage.getItem('wsp_todos');
  if(raw){try{return JSON.parse(raw)}catch(e){}}
  return defaultTodos.map(t=>({...t}));
}
function saveTodos(todos){localStorage.setItem('wsp_todos',JSON.stringify(todos))}

function initTodo(){
  renderTodos();
  $('#todo-add-btn').addEventListener('click',addTodo);
  $('#todo-input').addEventListener('keydown',e=>{if(e.key==='Enter')addTodo()});
}

function renderTodos(){
  const todos=loadTodos();
  const list=$('#todo-list');
  const done=todos.filter(t=>t.done).length;
  const total=todos.length;
  $('#todo-count').textContent=`${done}/${total}`;
  $('#todo-progress-bar').style.width=total?((done/total)*100)+'%':'0%';

  list.innerHTML='';
  todos.forEach((t,i)=>{
    const div=document.createElement('div');
    div.className='todo-item';
    div.draggable=true;
    div.dataset.index=i;
    div.innerHTML=`
      <div class="todo-checkbox ${t.done?'checked':''}" data-id="${t.id}"></div>
      <span class="todo-text ${t.done?'done':''}">${esc(t.text)}</span>
      <span class="todo-delete" data-id="${t.id}">×</span>`;
    list.appendChild(div);
  });

  // Events
  list.querySelectorAll('.todo-checkbox').forEach(cb=>{
    cb.addEventListener('click',()=>{
      const id=parseInt(cb.dataset.id);
      const todos=loadTodos();
      const t=todos.find(x=>x.id===id);
      if(t){t.done=!t.done;saveTodos(todos);renderTodos()}
    });
  });
  list.querySelectorAll('.todo-delete').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const id=parseInt(btn.dataset.id);
      let todos=loadTodos();
      todos=todos.filter(x=>x.id!==id);
      saveTodos(todos);renderTodos();
    });
  });

  // Drag and drop
  let dragIdx=null;
  list.querySelectorAll('.todo-item').forEach(item=>{
    item.addEventListener('dragstart',e=>{
      dragIdx=parseInt(item.dataset.index);
      item.classList.add('dragging');
      e.dataTransfer.effectAllowed='move';
    });
    item.addEventListener('dragend',()=>{
      item.classList.remove('dragging');
      list.querySelectorAll('.todo-item').forEach(i=>i.classList.remove('drag-over'));
    });
    item.addEventListener('dragover',e=>{
      e.preventDefault();
      e.dataTransfer.dropEffect='move';
      item.classList.add('drag-over');
    });
    item.addEventListener('dragleave',()=>item.classList.remove('drag-over'));
    item.addEventListener('drop',e=>{
      e.preventDefault();
      item.classList.remove('drag-over');
      const dropIdx=parseInt(item.dataset.index);
      if(dragIdx===null||dragIdx===dropIdx)return;
      const todos=loadTodos();
      const [moved]=todos.splice(dragIdx,1);
      todos.splice(dropIdx,0,moved);
      saveTodos(todos);renderTodos();
    });
  });
}

function addTodo(){
  const input=$('#todo-input');
  const text=input.value.trim();
  if(!text)return;
  const todos=loadTodos();
  const maxId=todos.reduce((m,t)=>Math.max(m,t.id),0);
  todos.push({id:maxId+1,text,done:false});
  saveTodos(todos);
  input.value='';
  renderTodos();
}

/* ================================================================
   EXIT POLLING
   ================================================================ */
function startExitPolling(){
  // Try to detect exit signal from URL params
  const params=new URLSearchParams(location.search);
  const port=params.get('port')||'8765';
  setInterval(()=>{
    fetch(`http://localhost:${port}/exit_status`,{mode:'no-cors',cache:'no-store'})
    .then(()=>{
      // If we get here (even no-cors returns opaque), we just ignore
      // We only trigger exit on a successful readable response
    })
    .catch(()=>{
      // Server not running, ignore
    });
    // Alternative: use a more reliable approach
    try{
      const xhr=new XMLHttpRequest();
      xhr.open('GET',`http://localhost:${port}/exit_status`,true);
      xhr.timeout=400;
      xhr.onload=function(){
        if(xhr.status===200&&xhr.responseText.trim()==='exit'){
          triggerExit();
        }
      };
      xhr.onerror=function(){};
      xhr.ontimeout=function(){};
      xhr.send();
    }catch(e){}
  },500);
}

function triggerExit(){
  const overlay=$('#exit-overlay');
  overlay.classList.add('active');
  setTimeout(()=>{
    document.title='Desktop';
    document.body.style.background='#000';
  },500);
}
